name: 02 - Pull Request Check

on:
  pull_request:
    branches: [main]           # runs when PR targets main branch

jobs:
  pr-validation:
    name: Validate Pull Request
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Check Dockerfile exists
        run: |
          if [ ! -f Dockerfile ]; then
            echo "ERROR: Dockerfile missing!"
            exit 1
          fi
          echo "Dockerfile found"

      - name: Build Docker image (test only, no push)
        run: |
          docker build -t demo-app:pr-test .
          echo "Docker build succeeded"

      - name: Check app starts correctly
        run: |
          docker run -d --name test-container -p 3000:3000 demo-app:pr-test
          sleep 5
          curl -f http://localhost:3000/health || exit 1
          echo "Health check passed"
          docker stop test-container
          docker rm test-container

      - name: PR Result
        run: echo "All checks passed — PR is safe to merge"
